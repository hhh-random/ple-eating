<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✈️ 공항에서 만나는 플레:이팅</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --text-dark: #2e5a6b;
    --text-mid: #5a8a9a;
    --bg: #f0f9fc;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(100,180,200,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }
  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: clamp(18px, 4vw, 26px); font-weight: 700; color: var(--text-dark); letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--text-mid); margin-top: 6px; }
  .card {
    background: var(--white);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 2rem 1.5rem;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }
  .wheel-wrap { position: relative; width: 280px; height: 280px; }
  canvas#wheel { display: block; }
  .pointer {
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 22px solid #7ab8c8;
    filter: drop-shadow(0 2px 4px rgba(122,184,200,0.4));
    z-index: 10;
  }
  .spin-btn {
    width: 100%; padding: 14px;
    font-size: 16px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; border-radius: 14px;
    background: linear-gradient(135deg, #A8D8EA, #9EC9C2);
    color: var(--text-dark); cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 14px rgba(160,210,230,0.45);
  }
  .spin-btn:hover { transform: translateY(-1px); }
  .spin-btn:active { transform: scale(0.98); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Cooldown */
  .cooldown-box {
    width: 100%;
    border-radius: 16px;
    border: 1.5px solid #d0eaf2;
    background: #f4fafd;
    padding: 24px 16px;
    text-align: center;
    display: none;
  }
  .cooldown-box.show { display: block; }
  .cooldown-emoji { font-size: 38px; margin-bottom: 10px; }
  .cooldown-title { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }
  .cooldown-desc { font-size: 13px; color: var(--text-mid); margin-bottom: 14px; line-height: 1.7; }
  .cooldown-timer { font-size: 26px; font-weight: 700; color: #7ab8c8; letter-spacing: 0.06em; }

  /* Popup */
  .popup-bg {
    position: fixed; inset: 0;
    background: rgba(46,90,107,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 1rem;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .popup-bg.show { opacity: 1; pointer-events: all; }
  .popup-card {
    background: white; border-radius: 28px;
    padding: 2.5rem 2rem 2rem;
    width: 100%; max-width: 340px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(46,90,107,0.25);
    transform: scale(0.8) translateY(30px);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0;
  }
  .popup-bg.show .popup-card { transform: scale(1) translateY(0); opacity: 1; }
  .popup-emoji { font-size: 52px; line-height: 1; margin-bottom: 1rem; display: block; }
  .popup-congrats { font-size: 13px; font-weight: 500; color: var(--text-mid); margin-bottom: 8px; }
  .popup-benefit { font-size: 26px; font-weight: 700; color: var(--text-dark); margin-bottom: 1.25rem; line-height: 1.3; }
  .popup-caption { font-size: 13px; color: var(--text-mid); margin-bottom: 1.5rem; }
  .popup-close-btn {
    width: 100%; padding: 13px;
    font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; border-radius: 14px;
    background: linear-gradient(135deg, #A8D8EA, #9EC9C2);
    color: var(--text-dark); cursor: pointer;
    box-shadow: 0 4px 14px rgba(160,210,230,0.4);
  }
  .popup-close-btn:hover { opacity: 0.9; }

  /* Confetti */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 199; overflow: hidden; }
  .confetti-piece { position: absolute; top: -20px; animation: confettiFall linear forwards; }
  @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<header>
  <h1>✈️ 공항에서 만나는 플레:이팅</h1>
  <p>돌림판을 돌려서 혜택을 받아가세요!</p>
</header>

<div class="card">
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="280" height="280"></canvas>
  </div>
  <button class="spin-btn" id="spinBtn" onclick="spin()">🎯 돌리기</button>
  <div class="cooldown-box" id="cooldownBox">
    <div class="cooldown-emoji">⏳</div>
    <p class="cooldown-title">오늘은 이미 참여하셨어요!</p>
    <p class="cooldown-desc">다음 참여까지 남은 시간</p>
    <p class="cooldown-timer" id="cooldownTimer">00:00:00</p>
  </div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<div class="popup-bg" id="popupBg">
  <div class="popup-card">
    <span class="popup-emoji">🎉</span>
    <p class="popup-congrats">축하합니다! 고객님의 혜택은</p>
    <p class="popup-benefit" id="popupBenefit"></p>
    <p class="popup-caption">📸 화면을 캡처해서 직원에게 보여주세요!</p>
    <button class="popup-close-btn" onclick="closePopup()">확인</button>
  </div>
</div>

<script>
const COLORS = ['#A8D8EA','#B8E0D2','#C9E4CA'];
const DEFAULT_BENEFITS = ['탄산음료 무료','생수 무료','메뉴 10% 할인'];
const COOLDOWN_KEY = 'plating_last_spin';
const COOLDOWN_MS = 24 * 60 * 60 * 1000; // 24시간

let benefits = DEFAULT_BENEFITS.slice();
try {
  const saved = localStorage.getItem('plating_benefits');
  if (saved) benefits = JSON.parse(saved);
} catch(e) {}

const N = benefits.length;
const ARC = (2 * Math.PI) / N;
let rotationOffset = 0;
let spinning = false;
let timerInterval = null;

// 24시간 제한 체크
function getLastSpinTime() {
  try { return parseInt(localStorage.getItem(COOLDOWN_KEY) || '0'); } catch(e) { return 0; }
}
function setLastSpinTime() {
  try { localStorage.setItem(COOLDOWN_KEY, Date.now().toString()); } catch(e) {}
}
function getRemainingMs() {
  const last = getLastSpinTime();
  if (!last) return 0;
  const elapsed = Date.now() - last;
  return Math.max(0, COOLDOWN_MS - elapsed);
}
function formatTime(ms) {
  const totalSec = Math.ceil(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function checkCooldown() {
  const remaining = getRemainingMs();
  const btn = document.getElementById('spinBtn');
  const box = document.getElementById('cooldownBox');

  if (remaining > 0) {
    btn.style.display = 'none';
    box.classList.add('show');
    document.getElementById('cooldownTimer').textContent = formatTime(remaining);
    if (!timerInterval) {
      timerInterval = setInterval(() => {
        const r = getRemainingMs();
        if (r <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          btn.style.display = '';
          box.classList.remove('show');
        } else {
          document.getElementById('cooldownTimer').textContent = formatTime(r);
        }
      }, 1000);
    }
  } else {
    btn.style.display = '';
    box.classList.remove('show');
  }
}

function drawWheel(highlightIdx = -1) {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx = 140, cy = 140, r = 132;
  ctx.clearRect(0, 0, 280, 280);

  for (let i = 0; i < N; i++) {
    const start = rotationOffset + ARC * i - Math.PI / 2;
    const end = start + ARC;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();

    const base = COLORS[i % COLORS.length];
    if (i === highlightIdx) {
      const rv = parseInt(base.slice(1,3),16);
      const gv = parseInt(base.slice(3,5),16);
      const bv = parseInt(base.slice(5,7),16);
      ctx.fillStyle = `rgb(${Math.min(255,rv+45)},${Math.min(255,gv+45)},${Math.min(255,bv+45)})`;
    } else {
      ctx.fillStyle = base;
    }
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + ARC / 2);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#2e5a6b';
    ctx.shadowColor = 'rgba(255,255,255,0.8)';
    ctx.shadowBlur = 4;

    const label = benefits[i];
    const maxW = r * 0.62;
    const fontSize = 13;
    ctx.font = `600 ${fontSize}px 'Noto Sans KR', sans-serif`;

    const words = label.split(' ');
    let lines = [], cur = '';
    for (const w of words) {
      const test = cur ? cur + ' ' + w : w;
      if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
      else cur = test;
    }
    if (cur) lines.push(cur);

    const lineH = fontSize + 4;
    const rMid = r * 0.56;
    lines.forEach((line, li) => {
      ctx.fillText(line, rMid, -(lines.length * lineH) / 2 + li * lineH + lineH * 0.75);
    });
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 16, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#cce0e8';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function spin() {
  if (spinning || getRemainingMs() > 0) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const winnerIdx = Math.floor(Math.random() * N);
  const finalOffset = -ARC * winnerIdx - ARC / 2;
  const spins = (Math.floor(Math.random() * 4) + 5) * 2 * Math.PI;
  let delta = ((finalOffset - rotationOffset) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  if (delta < 0.01) delta += 2 * Math.PI;
  const totalRotation = spins + delta;
  const startOffset = rotationOffset;
  const duration = 4000;
  const startTime = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function frame(now) {
    const t = Math.min((now - startTime) / duration, 1);
    rotationOffset = startOffset + totalRotation * easeOut(t);
    drawWheel();
    if (t < 1) { requestAnimationFrame(frame); return; }

    rotationOffset = finalOffset;
    drawWheel(winnerIdx);
    spinning = false;

    // 24시간 쿨다운 시작
    setLastSpinTime();

    setTimeout(() => {
      showPopup(benefits[winnerIdx]);
    }, 350);
  }
  requestAnimationFrame(frame);
}

function showPopup(benefit) {
  document.getElementById('popupBenefit').textContent = benefit;
  document.getElementById('popupBg').classList.add('show');
  launchConfetti();
}

function closePopup() {
  document.getElementById('popupBg').classList.remove('show');
  document.getElementById('confettiWrap').innerHTML = '';
  // 팝업 닫으면 쿨다운 표시
  checkCooldown();
}

function launchConfetti() {
  const wrap = document.getElementById('confettiWrap');
  wrap.innerHTML = '';
  const colors = ['#A8D8EA','#B8E0D2','#C9E4CA','#7ab8c8','#9EC9C2','#f9e4b7','#ffd6e0'];
  for (let i = 0; i < 72; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = Math.random() * 8 + 6;
    el.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${Math.random()*1.5+1.8}s;animation-delay:${Math.random()*0.5}s;opacity:${Math.random()*0.5+0.5};`;
    wrap.appendChild(el);
  }
}

drawWheel();
checkCooldown();
</script>
</body>
</html>
