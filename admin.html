<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — 플레:이팅 혜택 설정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --text-dark: #2e5a6b;
    --text-mid: #5a8a9a;
    --bg: #f0f9fc;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(100,180,200,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }

  /* 로그인 오버레이 */
  #loginOverlay {
    position: fixed; inset: 0;
    background: rgba(240,249,252,0.97);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .login-card {
    background: white; border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 2.5rem 2rem;
    width: 100%; max-width: 340px;
    text-align: center;
  }
  .login-card h2 { font-size: 20px; font-weight: 700; color: var(--text-dark); margin-bottom: 6px; }
  .login-card p { font-size: 13px; color: var(--text-mid); margin-bottom: 1.5rem; }
  .login-card input {
    width: 100%; padding: 12px 14px;
    font-size: 15px; font-family: 'Noto Sans KR', sans-serif;
    border: 1.5px solid #d0eaf2; border-radius: 12px;
    background: var(--bg); color: var(--text-dark);
    margin-bottom: 10px; outline: none;
    transition: border-color 0.15s;
  }
  .login-card input:focus { border-color: #7ab8c8; }
  .login-card .err { font-size: 12px; color: #e05a5a; margin-bottom: 10px; height: 16px; }
  .login-card button {
    width: 100%; padding: 13px;
    font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; border-radius: 12px;
    background: linear-gradient(135deg, #A8D8EA, #9EC9C2);
    color: var(--text-dark); cursor: pointer;
    box-shadow: 0 4px 14px rgba(160,210,230,0.4);
  }
  .login-card button:hover { opacity: 0.9; }

  /* 관리자 UI */
  #adminUI { display: none; width: 100%; max-width: 520px; }
  header { text-align: center; margin-bottom: 1.75rem; }
  header h1 { font-size: clamp(16px, 3.5vw, 22px); font-weight: 700; color: var(--text-dark); }
  header p { font-size: 12px; color: var(--text-mid); margin-top: 5px; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: #e6f7f2; color: #1a7a5e;
    border: 1px solid #b0e8d5; border-radius: 99px;
    padding: 3px 12px; font-size: 11px; font-weight: 500;
    margin-top: 10px;
  }

  .card {
    background: var(--white); border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 1.75rem 1.5rem;
    margin-bottom: 1.25rem; width: 100%;
  }
  .card-title {
    font-size: 12px; font-weight: 700; color: var(--text-mid);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 1rem;
  }

  /* 혜택 편집 */
  .benefit-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .benefit-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .benefit-row input {
    flex: 1; padding: 11px 14px;
    font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    border: 1.5px solid #d0eaf2; border-radius: 12px;
    background: var(--bg); color: var(--text-dark);
    outline: none; transition: border-color 0.15s;
  }
  .benefit-row input:focus { border-color: #7ab8c8; }

  .save-btn {
    width: 100%; padding: 13px;
    font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; border-radius: 14px;
    background: linear-gradient(135deg, #A8D8EA, #9EC9C2);
    color: var(--text-dark); cursor: pointer;
    box-shadow: 0 4px 14px rgba(160,210,230,0.4);
    transition: opacity 0.15s, transform 0.1s;
  }
  .save-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .save-btn:active { transform: scale(0.98); }
  .save-msg { font-size: 12px; color: #1a7a5e; margin-top: 8px; text-align: center; height: 18px; }

  /* 미리보기 */
  .preview-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }

  /* QR */
  .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .qr-url { font-size: 11px; color: var(--text-mid); word-break: break-all; text-align: center; max-width: 320px; line-height: 1.6; }
  .qr-input-row { display: flex; gap: 8px; width: 100%; }
  .qr-input-row input {
    flex: 1; padding: 10px 12px;
    font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
    border: 1.5px solid #d0eaf2; border-radius: 10px;
    background: var(--bg); color: var(--text-dark); outline: none;
  }
  .qr-input-row input:focus { border-color: #7ab8c8; }
  .qr-gen-btn {
    padding: 10px 16px; font-size: 13px; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; border-radius: 10px;
    background: #A8D8EA; color: var(--text-dark); cursor: pointer;
    white-space: nowrap;
  }
  .qr-gen-btn:hover { background: #93cce0; }

  .logout-btn {
    width: 100%; padding: 11px; font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    border: 1.5px solid #d0eaf2; border-radius: 12px;
    background: white; color: var(--text-mid); cursor: pointer;
  }
  .logout-btn:hover { background: var(--bg); }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginOverlay">
  <div class="login-card">
    <h2>🔐 관리자 로그인</h2>
    <p>혜택 목록을 수정하려면 비밀번호를 입력하세요</p>
    <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()" autofocus />
    <p class="err" id="errMsg"></p>
    <button onclick="checkPw()">로그인</button>
  </div>
</div>

<!-- 관리자 UI -->
<div id="adminUI">
  <header>
    <h1>✈️ 공항에서 만나는 플레:이팅</h1>
    <p>관리자 페이지 — 혜택을 수정하고 저장하세요</p>
    <div><span class="badge">✅ 관리자 모드</span></div>
  </header>

  <!-- 혜택 편집 -->
  <div class="card">
    <p class="card-title">혜택 목록 수정</p>
    <div id="benefitEditor"></div>
    <button class="save-btn" onclick="saveBenefits()">💾 저장하기</button>
    <p class="save-msg" id="saveMsg"></p>
  </div>

  <!-- 돌림판 미리보기 -->
  <div class="card">
    <p class="card-title">돌림판 미리보기</p>
    <div class="preview-wrap">
      <div style="position:relative;width:240px;height:240px;">
        <div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:18px solid #7ab8c8;z-index:10;"></div>
        <canvas id="previewWheel" width="240" height="240"></canvas>
      </div>
    </div>
  </div>

  <!-- QR 코드 생성 -->
  <div class="card">
    <p class="card-title">QR 코드 생성</p>
    <div class="qr-wrap">
      <p style="font-size:13px;color:var(--text-mid);">고객용 페이지 URL을 입력하면 QR 코드가 생성됩니다</p>
      <div class="qr-input-row">
        <input type="text" id="urlInput" placeholder="https://yoursite.netlify.app/" />
        <button class="qr-gen-btn" onclick="generateQR()">생성</button>
      </div>
      <div id="qrCode"></div>
      <p class="qr-url" id="qrUrlText"></p>
    </div>
  </div>

  <button class="logout-btn" onclick="logout()">🔓 로그아웃</button>
</div>

<script>
const ADMIN_PW = '1234';
const COLORS = ['#A8D8EA','#B8E0D2','#C9E4CA','#D0E8F2'];
const DEFAULT_BENEFITS = ['탄산음료 무료','생수 무료','메뉴 10% 할인','단품 주문시 세트 업그레이드'];

let benefits = DEFAULT_BENEFITS.slice();
try {
  const saved = localStorage.getItem('plating_benefits');
  if (saved) benefits = JSON.parse(saved);
} catch(e) {}

function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === ADMIN_PW) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('adminUI').style.display = 'block';
    renderEditor();
    drawPreview();
  } else {
    document.getElementById('errMsg').textContent = '비밀번호가 틀렸습니다';
  }
}

function renderEditor() {
  document.getElementById('benefitEditor').innerHTML = benefits.map((b,i) => `
    <div class="benefit-row">
      <div class="benefit-dot" style="background:${COLORS[i%COLORS.length]}"></div>
      <input type="text" id="b${i}" value="${b}" oninput="syncPreview()" />
    </div>`).join('');
}

function syncPreview() {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('b'+i);
    if (el) benefits[i] = el.value;
  }
  drawPreview();
}

function saveBenefits() {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('b'+i);
    if (el) benefits[i] = el.value;
  }
  try { localStorage.setItem('plating_benefits', JSON.stringify(benefits)); } catch(e) {}
  drawPreview();
  const msg = document.getElementById('saveMsg');
  msg.textContent = '✅ 저장 완료! 고객 페이지에 반영됩니다.';
  setTimeout(() => { msg.textContent = ''; }, 3000);
}

function drawPreview() {
  const canvas = document.getElementById('previewWheel');
  const ctx = canvas.getContext('2d');
  const cx = 120, cy = 120, r = 112;
  const N = benefits.length;
  const ARC = (2 * Math.PI) / N;
  ctx.clearRect(0, 0, 240, 240);

  for (let i = 0; i < N; i++) {
    const start = ARC * i - Math.PI / 2;
    const end = start + ARC;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + ARC / 2);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#2e5a6b';
    ctx.shadowColor = 'rgba(255,255,255,0.8)';
    ctx.shadowBlur = 4;

    const label = benefits[i] || '';
    const maxW = r * 0.62;
    const fontSize = 12;
    ctx.font = `600 ${fontSize}px 'Noto Sans KR', sans-serif`;

    const words = label.split(' ');
    let lines = [], cur = '';
    for (const w of words) {
      const test = cur ? cur + ' ' + w : w;
      if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
      else cur = test;
    }
    if (cur) lines.push(cur);

    const lineH = fontSize + 4;
    const rMid = r * 0.56;
    lines.forEach((line, li) => {
      ctx.fillText(line, rMid, -(lines.length * lineH) / 2 + li * lineH + lineH * 0.75);
    });
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 14, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#cce0e8';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function generateQR() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  const container = document.getElementById('qrCode');
  container.innerHTML = '';
  new QRCode(container, {
    text: url,
    width: 180, height: 180,
    colorDark: '#2e5a6b',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
  document.getElementById('qrUrlText').textContent = url;
}

function logout() {
  document.getElementById('adminUI').style.display = 'none';
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('pwInput').value = '';
  document.getElementById('errMsg').textContent = '';
}
</script>
</body>
</html>
